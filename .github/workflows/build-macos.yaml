name: Build for macOS

on:
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-15-intel
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Cache NodeJS modules
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            ./app/node_modules
          key: ${{ matrix.os }}-${{ runner.arch }}-deps-${{ hashFiles('yarn.lock') }}-${{ hashFiles('app/package-lock.json') }}

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: DEBUG=electron-packager npm run build

      - name: Build DMG
        run: |
          APP_PATH="app/dist/Courier-darwin-${{ matrix.arch }}/Courier.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find app/dist -maxdepth 3 -type d -name Courier.app | head -n 1)
          fi

          if [ ! -d "$APP_PATH" ]; then
            echo "Missing app bundle at $APP_PATH"
            ls -la app/dist
            exit 1
          fi

          if [ "${{ matrix.arch }}" = "arm64" ]; then
            DMG_NAME="Courier-AppleSilicon.dmg"
          else
            DMG_NAME="Courier-Intel.dmg"
          fi

          hdiutil create -volname "Courier" -srcfolder "$APP_PATH" -ov -format UDZO "app/dist/$DMG_NAME"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: courier-macos-${{ matrix.arch }}
          path: app/dist/*.dmg
          retention-days: 7

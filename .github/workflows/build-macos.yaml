name: Build for macOS

on:
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-15-intel
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Cache NodeJS modules
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            ./app/node_modules
          key: ${{ matrix.os }}-${{ runner.arch }}-deps-${{ hashFiles('yarn.lock') }}-${{ hashFiles('app/package-lock.json') }}

      - name: Install Dependencies
        run: npm ci

      - name: Setup AWS CLI
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Lint
        run: npm run lint

      - name: Build
        run: DEBUG=electron-packager npm run build

      - name: Build DMG
        run: |
          APP_PATH="app/dist/Courier.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Missing app bundle at $APP_PATH"
            ls -la app/dist
            exit 1
          fi

          if [ "${{ matrix.arch }}" = "arm64" ]; then
            DMG_NAME="Courier-AppleSilicon.dmg"
          else
            DMG_NAME="Courier-Intel.dmg"
          fi

          hdiutil create -volname "Courier" -srcfolder "$APP_PATH" -ov -format UDZO "app/dist/$DMG_NAME"

      - name: Sync artifacts to S3 bucket
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        run: |
          aws s3 sync app/dist/ "s3://mailspring-builds/client/$(git rev-parse --short=8 HEAD)/osx" \
            --acl public-read \
            --exclude "*" --include *.dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: courier-macos-${{ matrix.arch }}
          path: app/dist/*.dmg
          retention-days: 7
